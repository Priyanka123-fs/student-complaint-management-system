```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Complaint Management System</title>

    <!-- CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            padding: 15px 50px;
            background: rgba(0,0,0,0.3);
        }

        nav h1 {
            font-size: 24px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-top: 120px;
        }

        .hero h2 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        /* Buttons */
        .btn {
            padding: 12px 25px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .login-btn {
            background: #fff;
            color: #333;
        }

        .register-btn {
            background: #333;
            color: #fff;
        }

        .btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <h1>SCMS</h1>
        <div>
            <a href="#">Home</a>
            <a href="#">Login</a>
            <a href="#">Register</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="hero">
        <h2>Student Complaint Management System</h2>
        <p>Raise complaints, track progress, and get solutions faster.</p>

        <button class="btn login-btn" onclick="goToLogin()">Login</button>
        <button class="btn register-btn" onclick="goToRegister()">Register</button>
    </div>

    <!-- JavaScript -->
    <script>
        function goToLogin() {
            window.location.href = "login.html";
        }

        function goToRegister() {
            window.location.href = "register.html";
        }
    </script>

</body>
</html>
```
